services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${DB_USER:-blindmedley}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blindmedley}
      POSTGRES_DB: ${DB_DATABASE:-blindmedley}
    ports:
      - "${DB_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
